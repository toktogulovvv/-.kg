<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Админ Панель - Спецтехника.kg</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="admin-body" style="display: none; background: #f0f2f5;">

   <nav>
    <a href="index.html" class="logo-container">
        <img src="images/logo.png.png" alt="Логотип" class="logo-img">
        <span class="logo-text notranslate">Спецтехника.kg</span>
    </a>
    <a href="admin.html" class="admin-link">Админ панель</a> 
</nav>

    <div class="container">
        <div class="admin-box">
            <h3 id="form-title">Жаңы техника кошуу</h3>
            <input type="text" id="name" placeholder="Техниканын аты (мис: HOWO)" class="form-input">
            <input type="text" id="loc" placeholder="Аймак (мис: Жалал-Абад)" class="form-input">
            <input type="text" id="phone" placeholder="WhatsApp номер (мис: 996700123456)" class="form-input">
            
            <label style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">Сүрөт (алмаштырбасаңыз бош калтырыңыз):</label>
            <input type="file" id="techImageFile" accept="image/*" class="form-input">
            
            <button id="submit-btn" onclick="addItem()" class="btn btn-wa" style="width: 100%; border: none; cursor: pointer; padding: 12px; font-weight: bold;">САЙТКА ЧЫГАРУУ</button>
            <button id="cancel-btn" onclick="resetForm()" style="display:none; width: 100%; margin-top: 10px; background: gray; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer;">Жокко чыгаруу</button>
        </div>

        <div class="admin-list-container">
            <h3>Техникаларды башкаруу</h3>
            <div id="admin-product-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
